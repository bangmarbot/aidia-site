<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIKARI Forum — Pre-Survey</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      line-height: 1.6;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
    h1 span { color: #3b82f6; }
    .subtitle { color: #888; margin-bottom: 32px; font-size: 0.95rem; }
    .field { margin-bottom: 24px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; }
    label .hint { font-weight: 400; color: #888; font-size: 0.85rem; }
    input[type="text"], textarea {
      width: 100%;
      padding: 12px 14px;
      background: #141414;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e5e5e5;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { outline: none; border-color: #3b82f6; }
    textarea { min-height: 80px; resize: vertical; }
    .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .radio-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: #141414;
      border: 1px solid #333;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .radio-item:hover { border-color: #3b82f6; }
    .radio-item input[type="radio"] { accent-color: #3b82f6; }
    .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: #141414;
      border: 1px solid #333;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .checkbox-item:hover { border-color: #3b82f6; }
    .checkbox-item input[type="checkbox"] { accent-color: #3b82f6; }
    .btn {
      display: block; width: 100%;
      padding: 14px; border: none;
      background: #3b82f6; color: #fff;
      font-size: 1rem; font-weight: 600;
      border-radius: 8px; cursor: pointer;
      transition: background 0.2s;
      margin-top: 16px;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #555; cursor: not-allowed; }
    .success { display: none; text-align: center; padding: 48px 24px; }
    .success h2 { color: #3b82f6; margin-bottom: 12px; }
    .footer { text-align: center; color: #555; font-size: 0.8rem; margin-top: 32px; }
  </style>
</head>
<body>

<div class="container">
  <div id="form-section">
    <h1>📋 HIKARI <span>Forum</span></h1>
    <p class="subtitle">Pre-Survey Workshop AI — 5 April 2026<br>Isi form ini biar materi workshop sesuai kebutuhan kamu. Cuma 2 menit!</p>

    <form id="survey-form">
      <div class="field">
        <label>Nama</label>
        <input type="text" name="nama" required placeholder="Nama lengkap">
      </div>

      <div class="field">
        <label>1. Seberapa familiar kamu dengan AI? <span class="hint">(ChatGPT, Gemini, dll)</span></label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="familiar" value="Belum pernah pakai" required> Belum pernah pakai</label>
          <label class="radio-item"><input type="radio" name="familiar" value="Pernah coba tapi jarang"> Pernah coba tapi jarang</label>
          <label class="radio-item"><input type="radio" name="familiar" value="Sering pakai untuk kerjaan"> Sering pakai untuk kerjaan/sehari-hari</label>
          <label class="radio-item"><input type="radio" name="familiar" value="Power user"> Power user</label>
        </div>
      </div>

      <div class="field">
        <label>2. Kalau pernah pakai AI, biasanya buat apa?</label>
        <textarea name="usage" placeholder="Contoh: cari info, terjemahan, bikin konten, dll"></textarea>
      </div>

      <div class="field">
        <label>3. Apa yang paling pengen kamu pelajari dari workshop ini? <span class="hint">(boleh pilih lebih dari 1)</span></label>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="checkbox" name="learn" value="Dasar-dasar AI"> Dasar-dasar AI — apa itu, cara kerjanya</label>
          <label class="checkbox-item"><input type="checkbox" name="learn" value="ChatGPT untuk produktivitas"> Cara pakai ChatGPT/AI tools untuk produktivitas</label>
          <label class="checkbox-item"><input type="checkbox" name="learn" value="AI agent untuk bisnis"> Cara bikin AI agent untuk bisnis</label>
          <label class="checkbox-item"><input type="checkbox" name="learn" value="Lainnya"> Lainnya (tulis di bawah)</label>
        </div>
      </div>

      <div class="field">
        <label>4. Kamu kerja/bisnis di bidang apa?</label>
        <input type="text" name="bidang" placeholder="Contoh: F&B, retail, kontraktor, dll">
      </div>

      <div class="field">
        <label>5. Ada pertanyaan spesifik tentang AI yang pengen dijawab?</label>
        <textarea name="pertanyaan" placeholder="Tulis pertanyaan kamu di sini (opsional)"></textarea>
      </div>

      <button type="submit" class="btn" id="submit-btn">Kirim Survey ✨</button>
    </form>
  </div>

  <div class="success" id="success-section">
    <h2>Terima kasih! 🙏</h2>
    <p>Response kamu udah kami terima. Sampai ketemu di workshop tanggal 5 April!</p>
  </div>

  <div class="footer">HIKARI Forum — AI Workshop 2026</div>
</div>

<script>
document.getElementById('survey-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Mengirim...';

  const form = e.target;
  const data = {
    nama: form.nama.value,
    familiar: form.familiar.value,
    usage: form.usage.value,
    learn: Array.from(form.querySelectorAll('input[name="learn"]:checked')).map(c => c.value).join(', '),
    bidang: form.bidang.value,
    pertanyaan: form.pertanyaan.value,
    timestamp: new Date().toISOString()
  };

  try {
    // Send to Notion via proxy or directly log
    // For now, just show success (data logged in localStorage as backup)
    localStorage.setItem('hikari_survey_' + Date.now(), JSON.stringify(data));
    
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('success-section').style.display = 'block';
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Kirim Survey ✨';
    alert('Gagal mengirim. Coba lagi.');
  }
});
</script>

</body>
</html>
